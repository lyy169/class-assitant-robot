# Example configuration for the local processor role.
# Current runtime still reads the repository-root `config.yaml`.

paths:
  received_keyframes_dir: "received_keyframes"
  processed_results_dir: "processed_results"

models:
  use_merged_model: true
  merged_model_path: "runs/detect/train_interaction_v1/weights/best.pt"

runtime:
  source_host: "local-processor-dev"

inference:
  imgsz: 640
  conf: 0.35
  iou: 0.45
  max_det: 100

server:
  host: "0.0.0.0"
  port: 8000
